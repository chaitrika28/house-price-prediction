<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            color: white;
            padding: 30px;
            width: 100%;
            max-width: 600px;
        }
        h2 {
            color: #00d4ff;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        label {
            color: #ccc;
            font-size: 13px;
            margin-bottom: 3px;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #00d4ff;
            color: white;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.15);
        }
        .form-control::placeholder { color: #666; }
        .hint {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
        .btn-predict {
            background: linear-gradient(135deg, #00d4ff, #0077ff);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-predict:hover { opacity: 0.85; color: white; }
        .alert-danger {
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ff8080;
            border-radius: 10px;
        }
        .icon { font-size: 36px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card shadow-lg">
    <div class="icon">🏠</div>
    <h2>House Price Predictor</h2>
    <p class="subtitle">California Housing Model · Linear Regression · Enter details below</p>

    {% if error %}
    <div class="alert alert-danger">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'predict' %}">
        {% csrf_token %}
        <div class="row g-3">

            <div class="col-6">
                <label>Median Income (MedInc)</label>
                <input type="number" step="0.01" name="MedInc" class="form-control" placeholder="e.g. 5.0" required>
                <div class="hint">Median income in $10,000s</div>
            </div>

            <div class="col-6">
                <label>House Age (years)</label>
                <input type="number" name="HouseAge" class="form-control" placeholder="e.g. 20" required>
                <div class="hint">Median age of houses</div>
            </div>

            <div class="col-6">
                <label>Avg Rooms per House</label>
                <input type="number" step="0.1" name="AveRooms" class="form-control" placeholder="e.g. 6.0" required>
            </div>

            <div class="col-6">
                <label>Avg Bedrooms per House</label>
                <input type="number" step="0.1" name="AveBedrms" class="form-control" placeholder="e.g. 1.2" required>
            </div>

            <div class="col-6">
                <label>Population</label>
                <input type="number" name="Population" class="form-control" placeholder="e.g. 800" required>
                <div class="hint">Block population</div>
            </div>

            <div class="col-6">
                <label>Avg Occupants per House</label>
                <input type="number" step="0.1" name="AveOccup" class="form-control" placeholder="e.g. 3.0" required>
            </div>

            <div class="col-6">
                <label>Latitude</label>
                <input type="number" step="0.0001" name="Latitude" class="form-control" placeholder="e.g. 37.5" required>
            </div>

            <div class="col-6">
                <label>Longitude</label>
                <input type="number" step="0.0001" name="Longitude" class="form-control" placeholder="e.g. -122.0" required>
            </div>

        </div>
        <button type="submit" class="btn btn-predict mt-3">🔍 Predict Price</button>
    </form>
</div>
</body>
</html>
